 
 {% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — Speshway</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
  :root {
    --amber:    #d97706;
    --amber-lt: #fef3c7;
    --rust:     #b45309;
    --cream:    #fffbf5;
    --ink:      #1c1412;
    --muted:    #7c6f67;
    --border:   #e8ddd4;
    --glass:    rgba(255,251,245,0.82);
    --shadow:   0 8px 40px rgba(28,20,18,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Franklin Gothic Medium;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 85% 10%, #fde68a55 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 5% 90%,  #fcd34d33 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, #fff7ed   0%, transparent 80%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: -120px; right: -120px;
    width: 420px; height: 420px;
    border: 1.5px solid rgba(217,119,6,0.18);
    border-radius: 50%;
    pointer-events: none; z-index: 0;
    animation: spin 40s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ════════ TOPBAR ════════ */
  .topbar {
    position: sticky; top: 0; z-index: 999;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 48px;
    background: var(--glass);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .brand {
    font-family:  Franklin Gothic Medium;
    font-weight: 700; font-size: 26px;
     color: var(--ink);
    text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }

  .brand .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 0 3px rgba(217,119,6,.2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(217,119,6,.2); }
    50%      { box-shadow: 0 0 0 7px rgba(217,119,6,.07); }
  }

  /* ════════ PAGE BODY ════════ */
  .page-body {
    position: relative; z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
  }

  /* ── Card ── */
  .denied-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: var(--shadow);
    overflow: hidden;
    max-width: 520px;
    width: 100%;
    text-align: center;
    animation: fadeUp .55s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* gradient top bar */
  .denied-card::before {
    content: ''; display: block; height: 5px;
    background: linear-gradient(90deg, var(--amber), #f59e0b, var(--rust));
  }

  .denied-body { padding: 44px 44px 40px; }

  /* Lock icon */
  .lock-ring {
    width: 88px; height: 88px; border-radius: 50%;
    background: linear-gradient(135deg, var(--amber), var(--rust));
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; color: white;
    box-shadow: 0 8px 28px rgba(180,83,9,.32);
    position: relative;
  }

  /* pulsing ring around icon */
  .lock-ring::after {
    content: '';
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(217,119,6,.25);
    animation: ringPulse 2.4s ease-in-out infinite;
  }

  @keyframes ringPulse {
    0%,100% { transform: scale(1);   opacity: 1; }
    50%      { transform: scale(1.1); opacity: .4; }
  }

  /* Status tag */
  .status-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    color: #dc2626; background: #fef2f2;
    border: 1px solid #fecaca;
    padding: 4px 14px; border-radius: 99px;
    margin-bottom: 16px;
  }

  .denied-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 700; color: var(--ink);
    margin-bottom: 12px; line-height: 1.15;
  }

  .denied-desc {
    font-size: 15px; color: var(--muted);
    line-height: 1.7; margin-bottom: 0;
  }

  .denied-desc strong { color: var(--rust); font-weight: 700; }

  /* Course name pill */
  .course-pill {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--amber-lt);
    border: 1px solid #fde68a;
    color: var(--rust); font-size: 13px; font-weight: 700;
    padding: 7px 18px; border-radius: 99px;
    margin: 20px 0 28px;
  }

  .course-pill i { color: var(--amber); }

  /* CTA button */
  .btn-enroll {
    display: inline-flex; align-items: center; gap: 9px;
    background: linear-gradient(135deg, var(--amber), var(--rust));
    color: white; border: none;
    padding: 14px 36px; border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700;
    text-decoration: none;
    box-shadow: 0 6px 22px rgba(180,83,9,.34);
    transition: transform .22s, box-shadow .22s;
  }

  .btn-enroll:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(180,83,9,.44);
    color: white;
  }

  /* Back link */
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 18px;
    font-size: 13.5px; font-weight: 600; color: var(--muted);
    text-decoration: none;
    transition: color .2s;
  }

  .back-link:hover { color: var(--rust); }

  /* Feature list */
  .feature-strip {
    border-top: 1px solid var(--border);
    background: #fffbf2;
    padding: 20px 28px;
    display: flex; justify-content: center; gap: 28px; flex-wrap: wrap;
  }

  .feature-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 12.5px; font-weight: 600; color: var(--muted);
  }

  .feature-item i { color: var(--amber); font-size: 13px; }

  @media (max-width: 480px) {
    .denied-body { padding: 32px 22px 28px; }
    .topbar { padding: 12px 20px; }
    .feature-strip { gap: 16px; }
  }
  </style>
</head>

<body>

<!-- ════════ TOPBAR ════════ -->
<nav class="topbar">
  <a href="{% url 'student_dashboard' %}" class="brand">
    <span class="dot"></span>
    Speshway
  </a>
</nav>

<!-- ════════ PAGE ════════ -->
<div class="page-body">
  <div class="denied-card">

    <div class="denied-body">

      <!-- Lock icon -->
      <div class="lock-ring">
        <i class="fas fa-lock"></i>
      </div>

      <!-- Status -->
      <div class="status-tag">
        <i class="fas fa-circle-xmark"></i>
        Access Denied
      </div>

      <h1 class="denied-title">Enrollment Required</h1>

      <p class="denied-desc">
        You need to enroll in this course before you can access its lectures and content.
      </p>

      <!-- Course name -->
      <div>
        <span class="course-pill">
          <i class="fas fa-book-open"></i>
          {{ course.title }}
        </span>
      </div>

      <!-- CTA -->
      <a href="{% url 'student:enroll_course' course.id %}" class="btn-enroll">
        <i class="fas fa-bolt"></i> Enroll Now
      </a>

      <br>

      <a href="{% url 'student_dashboard' %}" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>

    </div>

    <!-- Feature strip -->
    <div class="feature-strip">
      <div class="feature-item"><i class="fas fa-infinity"></i> Lifetime Access</div>
      <div class="feature-item"><i class="fas fa-certificate"></i> Certificate</div>
      <div class="feature-item"><i class="fas fa-video"></i> Live Classes</div>
      <div class="feature-item"><i class="fas fa-headset"></i> Support</div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
