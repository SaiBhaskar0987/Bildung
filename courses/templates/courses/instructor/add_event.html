
{% block content %}

<style>
:root{
    --yellow-main: #f4c430;
    --yellow-light: #fff8dc;
    --brown-dark: #4b2e05;
    --brown-medium: #6b3e0f;
    --brown-light: #8b5a2b;
}

/* Background */
.container{
    background: var(--yellow-light);
}

/* Card */
.theme-card{
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(75,46,5,0.15);
}

/* Heading */
.theme-heading{
    color: var(--brown-dark);
}

/* Labels */
.form-label{
    color: var(--brown-dark);
}

/* Inputs */
.form-control{
    border-radius: 12px;
    border: 1.5px solid var(--brown-light);
}

.form-control:focus{
    border-color: var(--yellow-main);
    box-shadow: 0 0 0 0.2rem rgba(244,196,48,0.25);
}

/* 🔥 SELECT DROPDOWN DARK BROWN */
.form-select{
    border-radius: 12px;
    border: 1.5px solid var(--brown-light);
    background-color: var(--brown-dark);
    color: var(--yellow-main);
    font-weight: 500;
}

.form-select:focus{
    border-color: var(--yellow-main);
    box-shadow: 0 0 0 0.2rem rgba(244,196,48,0.25);
}

/* Dropdown options */
.form-select option{
    background: var(--brown-dark);
    color: var(--yellow-main);
}

/* Create Button */
.btn-theme{
    background: var(--brown-dark);
    color: white;
    border-radius: 10px;
    padding: 8px 18px;
    border: none;
}

.btn-theme:hover{
    background: var(--brown-medium);
    color: white;
}

/* Cancel Button */
.btn-cancel{
    background: var(--yellow-main);
    color: var(--brown-dark);
    border-radius: 10px;
    padding: 8px 18px;
    border: 2px solid var(--brown-dark);
}

.btn-cancel:hover{
    background: var(--brown-dark);
    color: white;
}
</style>
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body class="bg-light">

<div class="d-flex justify-content-between align-items-center p-3 bg-white shadow-sm">
  <a href="{% url 'instructor_dashboard' %}" class="text-decoration-none text-dark">
    <h3 class="m-0 fw-bold">Bildung</h3>
  </a>

  <div class="dropdown">
    <button class="btn rounded-circle shadow"
            style="background:gray;color:white;width:45px;height:45px;"
            data-bs-toggle="dropdown">
      {{ request.user.username|first|upper }}
    </button>

    <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="{% url 'instructor_profile_view' %}">Profile</a></li>
                <li><a class="dropdown-item" href="{% url 'instructor:add_course' %}">Create New Course</a></li>
                <li><a class="dropdown-item" href="{% url 'instructor:students_list' %}">My Students</a></li>
                <li><a class="dropdown-item" href="{% url 'instructor:calendar_view' %}">My Schedules</a></li>
                <li><a class="dropdown-item" href="{% url 'instructor_notifications' %}">Notifications</a></li>
                <li><a class="dropdown-item" href="#">Earnings & Payments</a></li>
                <li><a class="dropdown-item" href="#">Help & Support</a></li>
                <li><a class="dropdown-item" href="{% url 'instructor_account_settings' %}">Account Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="{% url 'logout_view' %}">Logout</a></li>
    </ul>
  </div>
</div>

<body class="bg-light py-5">


<div class="container py-5">

    <div class="card theme-card shadow-sm p-4 border-0">

        <h4 class="fw-bold mb-4 theme-heading">📌 Add New Event</h4>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Select Course</label>
                <select name="course" class="form-select" required>
                    <option value="">-- Choose Course --</option>

                    {% for c in instructor_courses %}
                        <option value="{{ c.id }}"
                            {% if selected_course_id == c.id %}selected{% endif %}>
                            {{ c.title }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Event Title</label>
                <input type="text"
                       name="{{ form.title.name }}"
                       value="{{ form.title.value|default:'' }}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea name="{{ form.description.name }}"
                          class="form-control"
                          rows="3">{{ form.description.value|default:'' }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Start Date & Time</label>
                <input type="datetime-local"
                       name="{{ form.start_time.name }}"
                       value="{{ form.start_time.value|default:'' }}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">End Date & Time</label>
                <input type="datetime-local"
                       name="{{ form.end_time.name }}"
                       value="{{ form.end_time.value|default:'' }}"
                       class="form-control"
                       required>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-theme me-2">
                    💡 Create Event
                </button>

                <a href="{% url 'instructor_dashboard' %}" class="btn btn-cancel">
                    Cancel
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
</body>
</html>
