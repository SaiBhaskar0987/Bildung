{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Assignment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

/* ================= THEME COLORS ================= */
:root{
  --yellow:#facc15;
  --yellow-soft:#fff7cc;
  --brown:#3a2a1a;
  --brown-dark:#5a3d1f;
}

/* ================= BACKGROUND ================= */
body{
    background: linear-gradient(135deg,#fffdf2,#fff7cc) !important;
    font-family: 'Segoe UI', sans-serif;
}

/* ================= MAIN CARD ================= */
.card{
    border-radius:25px !important;
    box-shadow:
        0 25px 70px rgba(58,42,26,0.15),
        0 0 60px rgba(250,204,21,0.1);
    border:none !important;
}

/* Header Title */
h3{
    color:var(--brown);
    font-weight:800;
}

/* Section Title */
h5{
    color:var(--brown-dark);
    font-weight:700;
}

/* ================= INPUT FIELDS ================= */
.form-control{
    border-radius:14px !important;
    border:2px solid var(--yellow);
    padding:12px;
}

.form-control:focus{
    border-color:var(--brown);
    box-shadow:0 0 0 4px rgba(250,204,21,0.35);
}

/* ================= DIVIDER ================= */
hr{
    height:2px;
    background:linear-gradient(to right,transparent,var(--yellow),transparent);
    border:none;
}

/* ================= ADD QUESTION BUTTON ================= */
.btn-outline-primary{
    border:2px solid var(--brown);
    color:var(--brown);
    border-radius:12px;
    font-weight:600;
}

.btn-outline-primary:hover{
    background:var(--brown);
    color:white;
}

/* ================= SAVE BUTTON ================= */
.btn-success{
    background:linear-gradient(135deg,var(--brown),var(--brown-dark));
    border:none;
    border-radius:14px;
    font-weight:600;
}

.btn-success:hover{
    box-shadow:0 10px 25px rgba(58,42,26,0.3);
}

/* ================= BACK BUTTON ================= */
.btn-outline-secondary{
    border:2px solid var(--yellow);
    color:var(--brown);
    border-radius:14px;
    font-weight:600;
}

.btn-outline-secondary:hover{
    background:var(--yellow);
    color:var(--brown);
}

/* ================= QUESTION BLOCKS (Dynamic) ================= */
#questionsContainer > div{
    border-left:5px solid var(--yellow);
    border-radius:15px;
    padding:15px;
    background:#fffdf5;
    box-shadow:0 8px 25px rgba(58,42,26,0.08);
    margin-bottom:15px;
}

    </style>
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">

            <h3 class="fw-bold text-center mb-4">✏️ Edit Assignment</h3>

            <!-- Assignment Details -->
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input id="assignmentTitle"
                       class="form-control"
                       value="{{ assignment.title }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea id="assignmentDescription"
                          class="form-control"
                          rows="3">{{ assignment.description }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Max Marks</label>
                <input id="assignmentMarks"
                       type="number"
                       class="form-control"
                       value="{{ assignment.max_marks }}">
            </div>

            <hr class="my-4">

            <!-- Coding Questions -->
            <h5 class="fw-bold">💻 Coding Questions</h5>
            <div id="questionsContainer"></div>

            <button type="button"
                    class="btn btn-outline-primary mt-3"
                    onclick="addQuestion()">
                + Add Question
            </button>

            <!-- Actions -->
            <div class="d-flex justify-content-end gap-2 mt-4">
                <button class="btn btn-success px-4"
                        onclick="saveAssignment()">
                    Save
                </button>

                <button class="btn btn-outline-secondary px-4"
                        onclick="goBack()">
                    Back
                </button>
            </div>

        </div>
    </div>
</div>

<!-- Existing questions -->
{{ questions|json_script:"questions-data" }}

<script>
const ASSIGNMENT_ID = "{{ assignment.id }}";
const SAVE_ASSIGNMENT_URL = "/courses/assignment/{{ assignment.id }}/save/";
const QUESTIONS_SAVE_URL = "/courses/assignment/{{ assignment.id }}/questions/save/";
const BACK_URL = "/accounts/instructor/courses/{{ assignment.course.id }}/edit/";
</script>

<script src="{% static 'js/edit_assignment.js' %}"></script>

</body>
</html>
