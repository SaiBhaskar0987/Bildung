 {% extends "base.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --ink:       #0F1117;
  --ink-soft:  #2C2F3A;
  --teal:      #0D9488;
  --teal-mid:  #14B8A6;
  --teal-glow: #5EEAD4;
  --teal-pale: #CCFBF1;
  --surface:   #F8FFFE;
  --card-bg:   #FFFFFF;
  --border:    #D1FAF6;
  --muted:     #64748B;
  --red:       #EF4444;
  --radius:    16px;
  --radius-sm: 10px;
}

.edit-lecture-wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

.back-link {
  display: inline-flex; align-items: center; gap: 7px;
  color: var(--teal); font-size: .85rem; font-weight: 600;
  text-decoration: none; margin-bottom: 24px;
  transition: gap .2s;
}
.back-link:hover { gap: 10px; }

.page-header { margin-bottom: 28px; }
.page-header h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 1.9rem;
  letter-spacing: -1px; color: var(--ink);
}
.page-header h2 span { color: var(--teal); }
.page-header p { color: var(--muted); margin-top: 5px; font-size: .88rem; }

/* ─── FORM CARD ─── */
.form-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 6px 28px rgba(13,148,136,.08);
  animation: fadeUp .4s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
.card-top-bar {
  height: 4px;
  background: linear-gradient(90deg, var(--teal), var(--teal-glow));
}
.card-header-row {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
}
.card-header-icon {
  width: 36px; height: 36px;
  background: var(--teal-pale); color: var(--teal);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; flex-shrink: 0;
}
.card-header-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 1rem; color: var(--ink);
}

/* ─── FORM FIELDS (auto-style Django's form.as_p output) ─── */
.form-body { padding: 26px 24px 6px; }

.form-body p {
  display: flex; flex-direction: column; gap: 5px;
  margin-bottom: 18px;
}

.form-body label {
  font-size: .73rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px;
  color: var(--muted);
}

.form-body input[type="text"],
.form-body input[type="number"],
.form-body input[type="url"],
.form-body input[type="email"],
.form-body input[type="date"],
.form-body input[type="datetime-local"],
.form-body textarea,
.form-body select {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem; color: var(--ink);
  background: #fff; outline: none;
  transition: border-color .2s, box-shadow .2s;
  appearance: none;
}
.form-body input:focus,
.form-body textarea:focus,
.form-body select:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(13,148,136,.12);
}
.form-body textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

/* File input */
.form-body input[type="file"] {
  width: 100%; padding: 7px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: .82rem; color: var(--muted);
  background: var(--surface); cursor: pointer;
  transition: border-color .2s;
}
.form-body input[type="file"]:focus { border-color: var(--teal); outline: none; }

/* Checkbox */
.form-body input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--teal);
  cursor: pointer;
  margin-top: 2px;
}
.form-body p:has(input[type="checkbox"]) {
  flex-direction: row; align-items: center; gap: 10px;
}
.form-body p:has(input[type="checkbox"]) label {
  text-transform: none; letter-spacing: 0;
  font-size: .88rem; font-weight: 500; color: var(--ink-soft);
  cursor: pointer;
}

/* Help text */
.form-body .helptext,
.form-body span.helptext {
  font-size: .74rem; color: var(--muted); margin-top: 2px;
}

/* Error messages */
.form-body ul.errorlist {
  list-style: none; padding: 0; margin: 3px 0 0;
}
.form-body ul.errorlist li {
  font-size: .78rem; color: var(--red); font-weight: 600;
}

/* Currently uploaded file link */
.form-body a {
  color: var(--teal); font-size: .82rem; font-weight: 600;
  text-decoration: none;
}
.form-body a:hover { text-decoration: underline; }

/* ─── BUTTONS ─── */
.btn-row {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding: 8px 24px 24px;
}
.btn-save {
  display: inline-flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, var(--teal), var(--teal-mid));
  color: #fff; border: none; border-radius: var(--radius-sm);
  padding: 10px 26px; font-size: .9rem; font-weight: 700;
  font-family: 'Syne', sans-serif; cursor: pointer;
  transition: opacity .2s, transform .15s;
}
.btn-save:hover { opacity: .88; transform: translateY(-1px); }

@media (max-width: 560px) {
  .edit-lecture-wrap { padding: 24px 16px 60px; }
  .btn-row { flex-direction: column; }
}
</style>

<div class="edit-lecture-wrap">

  <a href="javascript:history.back()" class="back-link">
    <i class="fa-solid fa-arrow-left"></i> Back
  </a>

  <div class="page-header">
    <h2>Edit <span>Lecture</span></h2>
    <p>Update the lecture title, content, or uploaded files below.</p>
  </div>

  <div class="form-card">
    <div class="card-top-bar"></div>
    <div class="card-header-row">
      <div class="card-header-icon"><i class="fa-solid fa-film"></i></div>
      <div class="card-header-title">Lecture Details</div>
    </div>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-body">
        {{ form.as_p }}
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-save">
          <i class="fa-solid fa-floppy-disk"></i> Save Changes
        </button>
      </div>
    </form>
  </div>

</div>

{% endblock %}
