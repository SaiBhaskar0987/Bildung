 {% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Reply</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --ink:       #0F1117;
  --ink-soft:  #2C2F3A;
  --teal:      #0D9488;
  --teal-mid:  #14B8A6;
  --teal-glow: #5EEAD4;
  --teal-pale: #CCFBF1;
  --surface:   #F8FFFE;
  --card-bg:   #FFFFFF;
  --border:    #D1FAF6;
  --muted:     #64748B;
  --red:       #EF4444;
  --radius:    16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--teal-glow); border-radius: 99px; }


.topnav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
}
.brand {
  font-family: 'sora', sans-serif;
  font-weight: 800; font-size: 1.35rem;
  letter-spacing: -.5px; color: var(--teal);
  text-decoration: none;
}
.brand span { color: var(--ink); }
.avatar-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--teal-mid));
  color: #fff; border: none; cursor: pointer;
  font-family: 'sora', sans-serif; font-weight: 700; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: box-shadow .2s, transform .15s;
}
.avatar-btn:hover { box-shadow: 0 0 0 4px var(--teal-pale); transform: scale(1.05); }
.dropdown-menu {
  border: 1px solid var(--border) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 12px 40px rgba(13,148,136,.12) !important;
  padding: 8px !important; min-width: 220px !important;
}
.dropdown-item {
  border-radius: var(--radius-sm);
  font-size: .875rem; color: var(--ink-soft);
  padding: 8px 12px;
  transition: background .15s, color .15s;
}
.dropdown-item:hover { background: var(--teal-pale); color: var(--teal); }
.dropdown-item.text-danger:hover { background: #FEE2E2; color: var(--red); }
.dropdown-divider { border-color: var(--border) !important; }


.page-wrap {
  min-height: calc(100vh - 64px);
  display: flex; align-items: center; justify-content: center;
  padding: 40px 24px;
}


.form-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  width: 100%; max-width: 580px;
  box-shadow: 0 8px 32px rgba(13,148,136,.08);
  animation: fadeUp .4s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.card-top-bar {
  height: 4px;
  background: linear-gradient(90deg, var(--teal), var(--teal-glow));
}
.card-header-row {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
}
.card-header-icon {
  width: 36px; height: 36px;
  background: var(--teal-pale); color: var(--teal);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; flex-shrink: 0;
}
.card-header-title {
  font-family: 'sora', sans-serif;
  font-weight: 700; font-size: 1rem; color: var(--ink);
}


.context-pill {
  margin: 20px 24px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--teal);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: .82rem; color: var(--muted);
  line-height: 1.5;
}
.context-pill strong { color: var(--ink-soft); font-size: .78rem; display: block; margin-bottom: 3px; }


.form-body { padding: 20px 24px 6px; }

.field-wrap { display: flex; flex-direction: column; gap: 5px; }
.field-label {
  font-size: .73rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px; color: var(--muted);
}
.field-textarea {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem; color: var(--ink);
  background: #fff; outline: none;
  resize: vertical; min-height: 120px; line-height: 1.6;
  transition: border-color .2s, box-shadow .2s;
}
.field-textarea:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(13,148,136,.12);
}


.btn-row {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding: 18px 24px 24px;
  justify-content: flex-end;
}
.btn-save {
  display: inline-flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, var(--teal), var(--teal-mid));
  color: #fff; border: none; border-radius: var(--radius-sm);
  padding: 10px 26px; font-size: .9rem; font-weight: 700;
  font-family: 'sora', sans-serif; cursor: pointer;
  transition: opacity .2s, transform .15s;
}
.btn-save:hover { opacity: .88; transform: translateY(-1px); }

.btn-cancel {
  display: inline-flex; align-items: center; gap: 7px;
  background: #fff; color: var(--muted);
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 20px; font-size: .9rem; font-weight: 600;
  text-decoration: none; transition: border-color .15s, color .15s;
}
.btn-cancel:hover { border-color: var(--muted); color: var(--ink); }

@media (max-width: 480px) {
  .topnav { padding: 0 16px; }
  .btn-row { flex-direction: column-reverse; }
}
</style>
</head>
<body>


<nav class="topnav">
  <a href="{% url 'instructor_dashboard' %}" class="brand">SPESH<span>WAY</span></a>
  <div class="dropdown">
    <button class="avatar-btn" type="button" data-bs-toggle="dropdown">
      {{ request.user.username|first|upper }}
    </button>
    <ul class="dropdown-menu dropdown-menu-end">
      <li><a class="dropdown-item" href="{% url 'instructor_profile_view' %}"><i class="fa-regular fa-user me-2"></i>Profile</a></li>
      <li><a class="dropdown-item" href="{% url 'instructor:add_course' %}"><i class="fa-solid fa-plus me-2"></i>Create New Course</a></li>
      <li><a class="dropdown-item" href="{% url 'instructor:students_list' %}"><i class="fa-solid fa-users me-2"></i>My Students</a></li>
      <li><a class="dropdown-item" href="{% url 'instructor:calendar_view' %}"><i class="fa-regular fa-calendar me-2"></i>My Schedules</a></li>
      <li><a class="dropdown-item" href="{% url 'instructor_notifications' %}"><i class="fa-regular fa-bell me-2"></i>Notifications</a></li>
      <li><a class="dropdown-item" href="#"><i class="fa-solid fa-wallet me-2"></i>Earnings & Payments</a></li>
      <li><a class="dropdown-item" href="#"><i class="fa-regular fa-circle-question me-2"></i>Help & Support</a></li>
      <li><a class="dropdown-item" href="{% url 'instructor_account_settings' %}"><i class="fa-solid fa-gear me-2"></i>Account Settings</a></li>
      <li><hr class="dropdown-divider"></li>
      <li><a class="dropdown-item text-danger" href="{% url 'logout_view' %}"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</a></li>
    </ul>
  </div>
</nav>


<div class="page-wrap">
  <div class="form-card">
    <div class="card-top-bar"></div>
    <div class="card-header-row">
      <div class="card-header-icon"><i class="fa-solid fa-pen-to-square"></i></div>
      <div class="card-header-title">Edit Reply</div>
    </div>

    
    <div class="context-pill">
      <strong><i class="fa-regular fa-circle-question me-1"></i> Original Question</strong>
      {{ reply.question.question }}
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="form-body">
        <div class="field-wrap">
          <label class="field-label">Your Reply</label>
          <textarea class="field-textarea" name="reply"
                    rows="5" required>{{ reply.reply }}</textarea>
        </div>
      </div>

      <div class="btn-row">
        <a href="{% url 'instructor:instructor_qna' reply.question.lecture.module.course.id %}"
           class="btn-cancel">
          <i class="fa-solid fa-xmark"></i> Cancel
        </a>
        <button type="submit" class="btn-save">
          <i class="fa-solid fa-floppy-disk"></i> Save Changes
        </button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
