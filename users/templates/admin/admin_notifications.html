{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Notifications</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
    background:#f3f4f6;
    font-family:'Segoe UI', sans-serif;
}

.topbar{
    background:white;
    padding:18px 25px;
    box-shadow:0 6px 20px rgba(0,0,0,0.05);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container-box{
    max-width:950px;
    margin:40px auto;
}

.note-card{
    background:white;
    border-radius:18px;
    padding:20px 22px;
    margin-bottom:15px;
    box-shadow:0 8px 22px rgba(0,0,0,0.05);
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.2s ease;
}

.note-card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 28px rgba(0,0,0,0.08);
}

.unread{
    border-left:6px solid #7C3AED;
    background:#f5f3ff;
}

.note-message{
    font-weight:500;
}

.time{
    font-size:13px;
    color:#6b7280;
    margin-top:4px;
}

.mark-btn{
    border:none;
    background:#eef2ff;
    color:#4f46e5;
    font-size:13px;
    padding:6px 12px;
    border-radius:8px;
    font-weight:600;
    transition:0.2s;
}

.mark-btn:hover{
    background:#6366f1;
    color:white;
}

.logout-btn{
    background:#ef4444;
    border:none;
    color:white;
    padding:8px 16px;
    border-radius:8px;
    font-weight:600;
}

.logout-btn:hover{
    background:#dc2626;
}
</style>
</head>

<body>

<div class="topbar">
    <a href="{% url 'admin_dashboard' %}" class="text-decoration-none text-dark">
        <h4 class="fw-bold m-0">Speshway</h4>
    </a>

    <a href="{% url 'logout_view' %}" class="btn btn-sm btn-danger rounded-pill px-3">
        Logout
    </a>
</div>

<div class="container-box">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fa-solid fa-bell me-2 text-primary"></i>
            Notifications
        </h4>

        {% if unread_count > 0 %}
        <a href="{% url 'courses:mark_all_admin_notifications_read' %}"
           class="btn btn-outline-primary btn-sm rounded-pill px-3">
           Mark all as read
        </a>
        {% endif %}
    </div>

    {% for note in notifications %}
    <div class="note-card {% if not note.is_read %}unread{% endif %}">

        <div>
            <div class="note-message">
                {{ note.message }}
            </div>
            <div class="time">
                <i class="fa-regular fa-clock me-1"></i>
                {{ note.created_at|timesince }} ago
            </div>
        </div>

        {% if not note.is_read %}
        <button class="mark-btn"
            onclick="markRead({{ note.id }})">
            <i class="fa-solid fa-check me-1"></i>
            Mark read
        </button>
        {% endif %}

    </div>
    {% empty %}
        <div class="alert alert-info rounded-4">
            <i class="fa-solid fa-circle-info me-2"></i>
            No notifications
        </div>
    {% endfor %}

</div>

<script>
function markRead(id){
    fetch(`/admin/notifications/read/${id}/`)
        .then(()=> location.reload());
}
</script>

</body>
</html>
