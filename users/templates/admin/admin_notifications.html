<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Notifications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fb;
    font-family:'Segoe UI',sans-serif;
}

.container-box{
    max-width:900px;
    margin:40px auto;
}

.note-card{
    background:white;
    border-radius:14px;
    padding:18px;
    margin-bottom:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.unread{
    border-left:5px solid #7C3AED;
    background:#f3f0ff;
}

.time{
    font-size:12px;
    color:#6b7280;
}

.mark-btn{
    border:none;
    background:none;
    color:#2563EB;
    font-size:13px;
}
</style>
</head>

<body class="bg-light">

<div class="d-flex justify-content-between align-items-center p-3 bg-white shadow-sm">
    <a href="{% url 'admin_dashboard' %}" class="text-decoration-none text-dark">
        <h4 class="fw-bold m-0">Bildung</h4>
    </a>
    <div>
        <a href="{% url 'logout_view' %}" class="btn btn-sm btn-danger">Logout</a>
    </div>
</div>

<div class="container py-4">


    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Notifications</h4>

        {% if unread_count > 0 %}
        <a href="{% url 'courses:mark_all_admin_notifications_read' %}"
           class="btn btn-outline-primary btn-sm">
            Mark all as read
        </a>
        {% endif %}
    </div>

    {% for note in notifications %}
    <div class="note-card {% if not note.is_read %}unread{% endif %}">
        <div>
            <div>{{ note.message }}</div>
            <div class="time">{{ note.created_at|timesince }} ago</div>
        </div>

        {% if not note.is_read %}
        <button class="mark-btn"
            onclick="markRead({{ note.id }})">
            Mark read
        </button>
        {% endif %}
    </div>
    {% empty %}
        <div class="alert alert-info">No notifications</div>
    {% endfor %}

</div>

<script>
function markRead(id){
    fetch(`/admin/notifications/read/${id}/`)
        .then(()=> location.reload());
}
</script>

</body>
</html>
