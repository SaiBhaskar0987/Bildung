{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Changed — Speshway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white:#ffffff; --border:#e8e4f0; --purple:#7c3aed; --purple-lt:#ede9fe;
  --pink:#ec4899; --blue:#3b82f6; --blue-lt:#dbeafe;
  --teal:#14b8a6; --teal-lt:#ccfbf1; --green:#22c55e; --green-lt:#dcfce7;
  --text:#1e1b2e; --muted:#6b7280; --muted-lt:#9ca3af;
}
html, body {
  height:100%;overflow:hidden;font-family:'Nunito',sans-serif;
  background:#fdfcff;display:flex;align-items:center;justify-content:center;
}
.bg-wrap {
  position:fixed;inset:0;z-index:0;overflow:hidden;
  background:linear-gradient(135deg,#f5f3ff 0%,#fdf4ff 40%,#fff1f5 70%,#f0fdfa 100%);
}
.bg-grid {
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(124,58,237,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.055) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 85% 85% at 50% 50%,black 20%,transparent 100%);
}
.blob{position:absolute;border-radius:50%;filter:blur(65px);pointer-events:none;animation:blobFloat 14s ease-in-out infinite alternate;}
.b1{width:500px;height:500px;top:-160px;left:-120px;background:radial-gradient(circle,rgba(124,58,237,.2),transparent 65%);}
.b2{width:420px;height:420px;bottom:-130px;right:-80px;background:radial-gradient(circle,rgba(236,72,153,.17),transparent 65%);animation-delay:-7s;}
.b3{width:280px;height:280px;top:35%;left:55%;background:radial-gradient(circle,rgba(59,130,246,.14),transparent 65%);animation-delay:-4s;}
.b4{width:220px;height:220px;bottom:20%;left:8%;background:radial-gradient(circle,rgba(20,184,166,.13),transparent 65%);animation-delay:-10s;}
@keyframes blobFloat{from{transform:translate(0,0) scale(1);}to{transform:translate(22px,18px) scale(1.06);}}
.rainbow-bar{
  position:fixed;top:0;left:0;right:0;height:4px;z-index:100;
  background:linear-gradient(90deg,#6366f1,#8b5cf6,#ec4899,#f59e0b,#10b981,#3b82f6);
  background-size:200% 100%;animation:rainbowShift 6s linear infinite;
}
@keyframes rainbowShift{0%{background-position:0%}100%{background-position:200%}}
#confettiCanvas{position:fixed;inset:0;z-index:5;pointer-events:none;}
.card {
  position:relative;z-index:10;
  width:520px;max-width:94vw;
  background:var(--white);
  border:2px solid rgba(124,58,237,.12);
  border-radius:28px;overflow:hidden;
  box-shadow:0 0 0 5px rgba(124,58,237,.05),0 32px 80px rgba(124,58,237,.16),0 8px 24px rgba(236,72,153,.08);
  animation:cardIn .75s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}

.card-strip{
  height:5px;
  background:linear-gradient(90deg,var(--purple),var(--pink),var(--teal),var(--green));
}

.card-inner{padding:44px 46px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.brand-link{text-decoration:none;color:inherit;margin-bottom:28px;display:block;}
.brand{display:flex;align-items:center;gap:10px;justify-content:center;}
.brand-icon{
  width:36px;height:36px;border-radius:11px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  display:grid;place-items:center;font-size:1rem;color:white;
  box-shadow:0 5px 14px rgba(124,58,237,.35);
}
.brand-name{
  font-size:1rem;font-weight:900;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.success-wrap{position:relative;margin-bottom:28px;}
.check-circle{
  width:96px;height:96px;border-radius:50%;
  background:linear-gradient(135deg,var(--green-lt),#bbf7d0);
  border:3px solid #86efac;
  display:grid;place-items:center;
  animation:popIn .55s cubic-bezier(.22,1,.36,1) .15s both;
  position:relative;z-index:1;
}
.check-circle i{font-size:2.4rem;color:var(--green);}
@keyframes popIn{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}

.pulse-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:2.5px solid rgba(34,197,94,.3);
  animation:pRing 2s ease-in-out infinite;
}
.pulse-ring-2{
  position:absolute;inset:-22px;border-radius:50%;
  border:2px solid rgba(34,197,94,.12);
  animation:pRing 2s ease-in-out .5s infinite;
}
@keyframes pRing{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.06);opacity:.2;}}

.card-title{font-size:1.5rem;font-weight:900;color:var(--text);margin-bottom:8px;line-height:1.2;}
.card-title .grad{background:linear-gradient(135deg,var(--green),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.card-sub{font-size:0.85rem;color:var(--muted);line-height:1.65;font-weight:500;max-width:360px;margin-bottom:24px;}
.next-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:22px;}
.next-card{
  background:#fafafa;border:1.5px solid #f0ecff;
  border-radius:14px;padding:14px 12px;text-align:center;
  transition:all .2s;
}
.next-card:hover{border-color:#ddd6fe;background:var(--purple-lt);transform:translateY(-2px);}
.next-card-icon{
  width:36px;height:36px;border-radius:10px;margin:0 auto 8px;
  display:grid;place-items:center;font-size:0.9rem;
}
.ni-1{background:rgba(59,130,246,.12);color:var(--blue);}
.ni-2{background:rgba(124,58,237,.12);color:var(--purple);}
.next-card strong{display:block;font-size:0.78rem;font-weight:800;color:var(--text);margin-bottom:2px;}
.next-card span{font-size:0.68rem;color:var(--muted-lt);}
.btn-login{
  width:100%;height:46px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:white;font-family:'Nunito',sans-serif;
  font-size:0.95rem;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  text-decoration:none;
  box-shadow:0 6px 20px rgba(124,58,237,.35);transition:all .22s;
}
.btn-login:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(124,58,237,.42);filter:brightness(1.06);color:white;}
.redirect-note{
  margin-top:14px;font-size:0.75rem;color:var(--muted-lt);
  font-family:'DM Mono',monospace;font-weight:500;
}
#cdNum{color:var(--purple);font-weight:700;}

@media(max-width:520px){
  html,body{overflow:auto;align-items:flex-start;}
  .card{border-radius:0;max-width:100vw;}
  .card-inner{padding:28px 20px;}
  .next-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="rainbow-bar"></div>
<div class="bg-wrap">
  <div class="bg-grid"></div>
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>
<canvas id="confettiCanvas"></canvas>

<div class="card">
  <div class="card-strip"></div>
  <div class="card-inner">

    <a href="{% url 'smart_home' %}" class="brand-link">
      <div class="brand">
        <div class="brand-icon"><i class="fas fa-user-graduate"></i></div>
        <div class="brand-name">Speshway</div>
      </div>
    </a>

    <div class="success-wrap">
      <div class="pulse-ring-2"></div>
      <div class="pulse-ring"></div>
      <div class="check-circle"><i class="fas fa-check"></i></div>
    </div>

    <h2 class="card-title">Password <span class="grad">changed!</span></h2>
    <p class="card-sub">Your password has been updated successfully. You can now sign in with your new credentials.</p>

    <div class="next-grid">
      <div class="next-card">
        <div class="next-card-icon ni-1"><i class="fas fa-arrow-right-to-bracket"></i></div>
        <strong>Sign In</strong>
        <span>Use your new password</span>
      </div>
      <div class="next-card">
        <div class="next-card-icon ni-2"><i class="fas fa-shield-halved"></i></div>
        <strong>Stay Secure</strong>
        <span>Don't share your password</span>
      </div>
    </div>

    <a href="{% url 'auth_page' %}" class="btn-login" id="loginBtn">
      <i class="fas fa-arrow-right-to-bracket"></i> Go to Login
    </a>

    <div class="redirect-note">Redirecting in <span id="cdNum">5</span>s…</div>

  </div>
</div>

<script>
// Countdown redirect
let cd = 5;
const cdEl = document.getElementById('cdNum');
const interval = setInterval(() => {
  cd--;
  cdEl.textContent = cd;
  if (cd <= 0) {
    clearInterval(interval);
    window.location.href = "{% url 'auth_page' %}";
  }
}, 1000);

// Confetti
(function(){
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#7c3aed','#ec4899','#3b82f6','#22c55e','#f59e0b','#14b8a6','#a78bfa','#f9a8d4'];
  const pieces = Array.from({length:110},() => ({
    x: Math.random()*canvas.width,
    y: Math.random()*-canvas.height,
    r: Math.random()*5+3,
    d: Math.random()*110+40,
    color: colors[Math.floor(Math.random()*colors.length)],
    tilt: Math.floor(Math.random()*10)-10,
    tiltAngle:0,
    tiltSpeed: Math.random()*0.1+0.04,
    speed: Math.random()*2+1.2,
    shape: Math.random()>0.5?'circle':'rect',
    opacity:1
  }));
  let frame=0, running=true;
  function draw(){
    if(!running) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frame++;
    pieces.forEach(p=>{
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.translate(p.x+p.tilt, p.y);
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}
      ctx.restore();
      p.y += p.speed; p.tiltAngle += p.tiltSpeed; p.tilt = Math.sin(p.tiltAngle)*12;
      if(p.y>canvas.height){ p.y=-10; p.x=Math.random()*canvas.width; }
      if(frame>260) p.opacity = Math.max(0, p.opacity-0.008);
    });
    if(frame<360) requestAnimationFrame(draw); else { running=false; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  setTimeout(()=>draw(),100);
  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
})();
</script>
</body>
</html>
