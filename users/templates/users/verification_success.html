{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Verified — Speshway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white:#ffffff; --border:#e8e4f0;
  --purple:#7c3aed; --purple-lt:#ede9fe;
  --pink:#ec4899;
  --blue:#3b82f6; --blue-lt:#dbeafe;
  --teal:#14b8a6; --teal-lt:#ccfbf1;
  --green:#22c55e; --green-lt:#dcfce7;
  --text:#1e1b2e; --muted:#6b7280; --muted-lt:#9ca3af;
}
html, body {
  height:100%; overflow:hidden; font-family:'Nunito',sans-serif;
  background:#fdfcff; display:flex; align-items:center; justify-content:center;
}
.bg-wrap {
  position:fixed; inset:0; z-index:0; overflow:hidden;
  background:linear-gradient(135deg,#f5f3ff 0%,#fdf4ff 40%,#fff1f5 70%,#f0fdfa 100%);
}
.bg-grid {
  position:absolute; inset:0;
  background-image:linear-gradient(rgba(124,58,237,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.055) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 85% 85% at 50% 50%,black 20%,transparent 100%);
}
.blob { position:absolute; border-radius:50%; filter:blur(65px); pointer-events:none; animation:blobFloat 14s ease-in-out infinite alternate; }
.b1 { width:500px;height:500px;top:-160px;left:-120px;background:radial-gradient(circle,rgba(124,58,237,.2),transparent 65%); }
.b2 { width:420px;height:420px;bottom:-130px;right:-80px;background:radial-gradient(circle,rgba(236,72,153,.17),transparent 65%);animation-delay:-7s; }
.b3 { width:280px;height:280px;top:35%;left:55%;background:radial-gradient(circle,rgba(59,130,246,.14),transparent 65%);animation-delay:-4s; }
.b4 { width:220px;height:220px;bottom:20%;left:8%;background:radial-gradient(circle,rgba(20,184,166,.13),transparent 65%);animation-delay:-10s; }
@keyframes blobFloat { from{transform:translate(0,0) scale(1);} to{transform:translate(22px,18px) scale(1.06);} }
.rainbow-bar {
  position:fixed;top:0;left:0;right:0;height:4px;z-index:100;
  background:linear-gradient(90deg,#6366f1,#8b5cf6,#ec4899,#f59e0b,#10b981,#3b82f6);
  background-size:200% 100%; animation:rainbowShift 6s linear infinite;
}
@keyframes rainbowShift { 0%{background-position:0%} 100%{background-position:200%} }

/* Confetti */
#confettiCanvas { position:fixed;inset:0;z-index:5;pointer-events:none; }

/* Card */
.card {
  position:relative; z-index:10;
  width:520px; max-width:94vw;
  background:var(--white);
  border:2px solid rgba(124,58,237,.12);
  border-radius:28px; overflow:hidden;
  box-shadow:0 0 0 5px rgba(124,58,237,.05),0 32px 80px rgba(124,58,237,.16),0 8px 24px rgba(236,72,153,.08);
  animation:cardIn .75s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(.97);} to{opacity:1;transform:translateY(0) scale(1);} }
.card-strip { height:5px; background:linear-gradient(90deg,var(--green),var(--teal),var(--purple),var(--pink)); }
.card-inner { padding:44px 48px; display:flex; flex-direction:column; align-items:center; text-align:center; }

/* Brand */
.brand-link { text-decoration:none; color:inherit; margin-bottom:28px; display:block; }
.brand { display:flex; align-items:center; gap:10px; justify-content:center; }
.brand-icon {
  width:38px; height:38px; border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  display:grid; place-items:center; font-size:1.05rem; color:white;
  box-shadow:0 5px 14px rgba(124,58,237,.35);
}
.brand-name {
  font-size:1.05rem; font-weight:900;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

/* Check animation */
.check-wrap { position:relative; margin-bottom:26px; }
.check-circle {
  width:96px; height:96px; border-radius:50%;
  background:linear-gradient(135deg,#dcfce7,#bbf7d0);
  border:3px solid #86efac;
  display:grid; place-items:center;
  position:relative; z-index:1;
  animation:popIn .55s cubic-bezier(.22,1,.36,1) .2s both;
}
@keyframes popIn { from{opacity:0;transform:scale(.4) rotate(-20deg);} to{opacity:1;transform:scale(1) rotate(0deg);} }
.check-circle i { font-size:2.4rem; color:var(--green); }
.pulse-r { position:absolute; inset:-10px; border-radius:50%; border:2.5px solid rgba(34,197,94,.3); animation:pR 2.2s ease-in-out infinite; }
.pulse-r2 { position:absolute; inset:-22px; border-radius:50%; border:2px solid rgba(34,197,94,.12); animation:pR 2.2s ease-in-out .55s infinite; }
@keyframes pR { 0%,100%{transform:scale(1);opacity:.7;} 50%{transform:scale(1.06);opacity:.2;} }

/* Badge */
.page-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--green-lt); border:2px solid #bbf7d0;
  color:#166534; font-size:0.68rem; font-weight:800;
  letter-spacing:.12em; text-transform:uppercase;
  padding:4px 13px; border-radius:999px; margin-bottom:14px;
  font-family:'DM Mono',monospace;
}

.card-title { font-size:1.55rem; font-weight:900; color:var(--text); margin-bottom:8px; line-height:1.2; }
.card-title .grad { background:linear-gradient(135deg,var(--green),var(--teal)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.card-sub { font-size:0.85rem; color:var(--muted); line-height:1.65; font-weight:500; max-width:360px; margin-bottom:24px; }

/* Welcome card */
.welcome-card {
  width:100%; border-radius:18px; overflow:hidden; margin-bottom:22px;
  background:linear-gradient(135deg,#1e1b2e 0%,#2d1b69 65%,#1b2d2d 100%);
  padding:22px 24px; text-align:left; position:relative;
}
.welcome-card::before {
  content:''; position:absolute; top:-40px; right:-40px;
  width:130px; height:130px; border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,.3),transparent 65%);
  pointer-events:none;
}
.wc-label {
  font-family:'DM Mono',monospace; font-size:0.65rem;
  letter-spacing:.16em; text-transform:uppercase;
  color:rgba(196,181,253,.6); margin-bottom:7px;
}
.wc-name { font-size:1.3rem; font-weight:900; color:white; margin-bottom:4px; }
.wc-name span { background:linear-gradient(135deg,#c4b5fd,#f9a8d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.wc-sub { font-size:0.78rem; color:rgba(255,255,255,.35); font-weight:500; }

/* Perks row */
.perks { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; width:100%; margin-bottom:22px; }
.perk {
  background:#fafafa; border:1.5px solid #f0ecff;
  border-radius:14px; padding:14px 10px; text-align:center;
  transition:all .2s;
}
.perk:hover { border-color:#ddd6fe; background:var(--purple-lt); transform:translateY(-2px); }
.perk-icon {
  width:36px; height:36px; border-radius:10px; margin:0 auto 8px;
  display:grid; place-items:center; font-size:0.88rem;
}
.pi-1 { background:rgba(124,58,237,.12); color:var(--purple); }
.pi-2 { background:rgba(20,184,166,.12); color:var(--teal); }
.pi-3 { background:rgba(245,158,11,.12); color:#d97706; }
.perk strong { display:block; font-size:0.72rem; font-weight:800; color:var(--text); margin-bottom:2px; }
.perk span   { font-size:0.65rem; color:var(--muted-lt); }

/* CTA */
.btn-login {
  width:100%; height:46px; border:none; border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:white; font-family:'Nunito',sans-serif;
  font-size:0.95rem; font-weight:900; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:9px;
  text-decoration:none;
  box-shadow:0 6px 20px rgba(124,58,237,.35); transition:all .22s;
}
.btn-login:hover { transform:translateY(-3px); box-shadow:0 12px 28px rgba(124,58,237,.42); filter:brightness(1.06); color:white; }

/* Redirect */
.redirect-note { margin-top:14px; font-size:0.75rem; color:var(--muted-lt); font-family:'DM Mono',monospace; font-weight:500; }
#cdNum { color:var(--purple); font-weight:700; }

@media(max-width:540px){
  html,body{overflow:auto;align-items:flex-start;}
  .card{border-radius:0;max-width:100vw;}
  .card-inner{padding:28px 20px;}
  .perks{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="rainbow-bar"></div>
<div class="bg-wrap">
  <div class="bg-grid"></div>
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>
<canvas id="confettiCanvas"></canvas>

<div class="card">
  <div class="card-strip"></div>
  <div class="card-inner">

    <a href="{% url 'smart_home' %}" class="brand-link">
      <div class="brand">
        <div class="brand-icon"><i class="fas fa-user-graduate"></i></div>
        <div class="brand-name">Speshway</div>
      </div>
    </a>

    <div class="check-wrap">
      <div class="pulse-r2"></div>
      <div class="pulse-r"></div>
      <div class="check-circle"><i class="fas fa-check"></i></div>
    </div>

    <div class="page-badge">✅ Verified</div>
    <h2 class="card-title">You're <span class="grad">all set!</span></h2>
    <p class="card-sub">Your email has been verified and your account is now active. Welcome to Speshway!</p>

    <div class="welcome-card">
      <div class="wc-label">Welcome aboard</div>
      <div class="wc-name">Hello, <span>{{ user.first_name }} 👋</span></div>
      <div class="wc-sub">Your learning journey starts right now.</div>
    </div>


    <a href="{% url 'student_login' %}" class="btn-login">
      <i class="fas fa-arrow-right-to-bracket"></i> Sign In & Start Learning
    </a>


  </div>
</div>

</body>
</html>
